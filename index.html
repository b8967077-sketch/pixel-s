<!DOCTYPE html>
<html>
<head>
  <title>Pixel Market</title>

  <style>
    body{
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    h2{
      margin:10px;
    }

    /* 🧱 الشبكة */
    .grid{
      display:grid;
      grid-template-columns:repeat(40, 20px);
      gap:4px;
      justify-content:center;
    }

    /* ✨ المربعات */
    .pixel{
      width:20px;
      height:20px;
      background:#1e293b;
      border-radius:6px;
      cursor:pointer;
      transition:0.2s;
      box-shadow:0 0 5px rgba(59,130,246,0.2);
    }

    .pixel:hover{
      transform:scale(1.4);
      box-shadow:0 0 15px #3b82f6;
    }

    .pixel img{
      width:100%;
      height:100%;
      border-radius:6px;
      object-fit:cover;
    }

  </style>
</head>

<body>

<h2 id="user"></h2>

<div class="grid" id="grid"></div>

<script>
const grid = document.getElementById("grid");

// 👤 المستخدم
let user = localStorage.getItem("user");
if(!user) location="login.html";

document.getElementById("user").innerText = "👤 " + user;

// 🔊 صوت احترافي
const ctx = new AudioContext();
document.onclick = () => ctx.resume();

function sound(){
  const o = ctx.createOscillator();
  const g = ctx.createGain();

  o.connect(g);
  g.connect(ctx.destination);

  o.frequency.value = 250 + Math.random()*200;
  g.gain.value = 0.1;

  o.start();
  o.stop(ctx.currentTime + 0.05);
}

// 📥 تحميل المربعات
fetch("/pixels")
.then(r => r.json())
.then(data => {

  for(let i=1; i<=1000; i++){

    let d = document.createElement("div");
    d.className = "pixel";

    // 🔊 صوت عند المرور
    d.onmouseenter = sound;

    if(data[i]){
      d.innerHTML = `<img src="${data[i].image}">`;

      d.onclick = () => {
        window.open(data[i].link);
      };

    } else {
      d.onclick = () => buy(i);
    }

    grid.appendChild(d);
  }

});

// 💳 شراء + دفع
function buy(id){

  const link = prompt("ضع الرابط:");
  if(!link) return;

  const image = prompt("ضع رابط الصورة:");
  if(!image) return;

  fetch("/create-checkout-session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id,
      link,
      image,
      owner:user
    })
  })
  .then(r => r.json())
  .then(data => {
    window.location = data.url;
  });

}
</script>

</body>
</html>
