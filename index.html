<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2 id="user"></h2>

<div id="grid" style="display:grid;grid-template-columns:repeat(40,20px);gap:4px;justify-content:center;"></div>

<script>
let user = localStorage.getItem("user");
if(!user) location="login.html";

document.getElementById("user").innerText = user;

fetch("/pixels")
.then(r=>r.json())
.then(data=>{

  for(let i=1;i<=400;i++){

    let d=document.createElement("div");
    d.style="width:20px;height:20px;background:#1e293b;border-radius:5px;cursor:pointer";

    if(data[i]){
      d.innerHTML=`<img src="${data[i].image}" style="width:100%;height:100%">`;
      d.onclick=()=>window.open(data[i].link);
    }else{
      d.onclick=()=>buy(i);
    }

    grid.appendChild(d);
  }

});

function buy(id){

  const link = prompt("link:");
  if(!link) return;

  const image = prompt("image:");
  if(!image) return;

  fetch("/create-checkout-session",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,link,image,owner:user})
  })
  .then(r=>r.json())
  .then(d=>location=d.url);
}
</script>

</body>
</html>
