<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2>Login / Register</h2>

<input id="u" placeholder="username"><br><br>
<input id="p" type="password" placeholder="password"><br><br>

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<script>
function register(){
  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:u.value,
      password:p.value
    })
  }).then(r=>r.text()).then(alert);
}

function login(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:u.value,
      password:p.value
    })
  })
  .then(r=>r.text())
  .then(t=>{
    if(t==="OK"){
      localStorage.setItem("user", u.value);
      location="index.html";
    } else alert("❌ خطأ");
  });
}
</script>

</body>
</html>
