<!DOCTYPE html>
<html>
<body style="background:#020617;color:white;text-align:center">

<h2>⏳ جاري التحقق...</h2>

<script>
const p = new URLSearchParams(location.search);
const id = p.get("session_id");

fetch("/verify-payment?session_id="+id)
.then(r=>r.text())
.then(t=>{
  alert(t==="saved" ? "🎉 تم الحفظ" : "❌ فشل");
  location="index.html";
});
</script>

</body>
</html>
